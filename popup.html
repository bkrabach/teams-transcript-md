<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Teams Transcript → Markdown</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Teams Transcript → Markdown</h1>
      <p class="hint">
        Open the transcript on a Teams meeting recording, then click
        Capture.
      </p>
    </header>

    <main>
      <div class="target" id="target">
        <span class="target-label">Tab:</span>
        <span class="target-url" id="target-url">…</span>
      </div>

      <button id="capture" class="primary">Capture &amp; Download</button>
      <div id="status" role="status" aria-live="polite"></div>

      <section
        id="result"
        class="result hidden"
        role="region"
        aria-label="Last download"
      >
        <div class="result-info">
          <span class="result-filename" id="result-filename"></span>
          <span class="result-meta" id="result-meta"></span>
        </div>
        <div class="result-actions">
          <button id="open-file" class="secondary" type="button">Open</button>
          <button id="show-folder" class="secondary" type="button">
            Show in folder
          </button>
        </div>
      </section>

      <fieldset class="format">
        <legend>Save as</legend>
        <label>
          <input type="radio" name="fmt" value="md" checked />
          Markdown <span class="muted">(.md, LLM-friendly)</span>
        </label>
        <label>
          <input type="radio" name="fmt" value="vtt" />
          Raw WebVTT <span class="muted">(.vtt, recordings only)</span>
        </label>
      </fieldset>

      <details>
        <summary>Markdown options</summary>
        <label>
          <input id="opt-timestamps" type="checkbox" checked />
          Include <code>[MM:SS]</code> timestamps
        </label>
        <label>
          <input id="opt-merge" type="checkbox" checked />
          Merge consecutive same-speaker entries
        </label>
        <label>
          Label for unnamed speakers
          <input id="opt-unknown" type="text" value="Unknown" maxlength="40" />
        </label>
      </details>

      <p id="saved-hint" class="saved-hint fade" aria-live="polite"></p>
    </main>

    <footer>
      <p class="muted">
        Fastest on SharePoint recording pages
        (<code>stream.aspx</code>): pulls the WebVTT file directly
        from the server in ~1–3 s.
      </p>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
